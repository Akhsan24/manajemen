<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | Manajemen Syariah</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div id="navbar"></div>

<section class="page-header">
    <div class="container">
        <h1>Galeri <span class="highlight">Kegiatan</span></h1>
        <p>Dokumentasi seminar, workshop, dan pelatihan manajemen syariah</p>
    </div>
</section>

<section class="gallery" style="padding: 60px 0;">
    <div class="container">
        <div class="category-grid" style="grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));">
            <div class="category-card" style="padding: 1rem;">
                <i class="fas fa-chalkboard-user" style="font-size: 3rem;"></i>
                <h3>Seminar Nasional</h3>
                <p>Manajemen Syariah di Era Digital - 2024</p>
            </div>
            <div class="category-card" style="padding: 1rem;">
                <i class="fas fa-book" style="font-size: 3rem;"></i>
                <h3>Bedah Buku</h3>
                <p>Fiqh Muamalah Kontemporer</p>
            </div>
            <div class="category-card" style="padding: 1rem;">
                <i class="fas fa-users-between" style="font-size: 3rem;"></i>
                <h3>Workshop SDI</h3>
                <p>Pengembangan SDM Berbasis Syariah</p>
            </div>
            <div class="category-card" style="padding: 1rem;">
                <i class="fas fa-hand-holding-usd" style="font-size: 3rem;"></i>
                <h3>Pelatihan Keuangan</h3>
                <p>Manajemen Zakat & Wakaf Produktif</p>
            </div>
        </div>
    </div>
</section>

<div id="footer"></div>
<script src="assets/js/script.js"></script>
</body>
</html>
