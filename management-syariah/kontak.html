<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak | Manajemen Syariah</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div id="navbar"></div>

<section class="page-header">
    <div class="container">
        <h1>Hubungi <span class="highlight">Kami</span></h1>
        <p>Silakan sampaikan pesan dan pertanyaan Anda</p>
    </div>
</section>

<section class="contact-info" style="padding: 60px 0;">
    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            <div style="background: white; border-radius: 20px; padding: 2rem;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <i class="fas fa-map-marker-alt" style="font-size: 2rem; color: var(--gold);"></i>
                    <div>
                        <h3>Alamat</h3>
                        <p>Jl. Pendidikan No. 123, Jakarta Selatan</p>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <i class="fas fa-phone" style="font-size: 2rem; color: var(--gold);"></i>
                    <div>
                        <h3>Telepon</h3>
                        <p>+62 812 3456 7890</p>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <i class="fas fa-envelope" style="font-size: 2rem; color: var(--gold);"></i>
                    <div>
                        <h3>Email</h3>
                        <p>info@manajemensyariah.com</p>
                    </div>
                </div>
            </div>
            <div style="background: white; border-radius: 20px; padding: 2rem;">
                <form id="contactForm">
                    <input type="text" placeholder="Nama Anda" required style="width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px;">
                    <input type="email" placeholder="Email" required style="width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px;">
                    <textarea placeholder="Pesan" rows="5" required style="width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%;">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </div>
</section>

<div id="footer"></div>
<script src="assets/js/script.js"></script>
<script>
    document.getElementById('contactForm')?.addEventListener('submit', function(e) {
        e.preventDefault();
        alert('Pesan Anda telah terkirim. Terima kasih!');
        this.reset();
    });
</script>
</body>
</html>
